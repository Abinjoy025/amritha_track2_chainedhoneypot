user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Extended log format for the watchdog ─────────────────────────────────
    # Includes: status code, upstream response, request body (POST) hint
    log_format  detailed  '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'rt=$request_time';

    access_log  /var/log/nginx/access.log  detailed;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # ── Simple "company portal" to attract attackers ──────────────────
        root  /usr/share/nginx/html;
        index index.html;

        # Log 4xx attempts prominently for the watchdog
        location /admin {
            auth_basic "Admin Area - Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            try_files $uri $uri/ =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
